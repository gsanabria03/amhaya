<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMHAYA | Agenda Admin</title>

<style>
:root{
  --bg:#0a0a0a;
  --card:#111;
  --accent:#ffcc00;
  --text:#fff;
  --muted:#aaa;
  --border:rgba(255,255,255,0.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:radial-gradient(circle at top,#151515,#0a0a0a 60%,#000);
  color:var(--text);
}

/* HEADER */
header{
  padding:18px;
  text-align:center;
  border-bottom:1px solid var(--border);
}

header h1{
  color:var(--accent);
  letter-spacing:2px;
}

/* LAYOUT */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
}

/* LEFT PANEL */
.sidebar{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  height:fit-content;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:8px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #222;
  background:#0f0f0f;
  color:#fff;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:var(--accent);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
}

/* RIGHT PANEL */
.agenda{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
}

/* HOURS LIST */
.slot{
  display:flex;
  gap:12px;
  align-items:flex-start;
  margin-bottom:10px;
}

.time{
  width:80px;
  color:#888;
  font-size:13px;
}

/* EVENT */
.event{
  flex:1;
  background:rgba(255,204,0,0.08);
  border-left:3px solid var(--accent);
  padding:10px;
  border-radius:10px;
}

.event h3{
  color:var(--accent);
  font-size:14px;
}

.event p{
  font-size:12px;
  color:#aaa;
}

/* EMPTY */
.empty{
  color:#555;
  font-size:12px;
}

/* FORM TITLE */
h3{
  margin-top:10px;
  margin-bottom:5px;
  color:var(--accent);
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <h1>AMHAYA • Panel de Agenda</h1>
</header>

<div class="container">

  <!-- LEFT: ADMIN PANEL -->
  <div class="sidebar">

    <h3>Seleccionar fecha</h3>
    <input type="date" id="date">

    <h3>Nombre cliente</h3>
    <input type="text" id="name">

    <h3>Teléfono</h3>
    <input type="text" id="phone">

    <h3>Email</h3>
    <input type="text" id="email">

    <h3>Hora</h3>
    <select id="time">
      <option>09:00</option>
      <option>10:00</option>
      <option>11:00</option>
      <option>12:00</option>
      <option>13:00</option>
      <option>14:00</option>
      <option>15:00</option>
      <option>16:00</option>
      <option>17:00</option>
    </select>

    <button onclick="addAppointment()">Agregar cita</button>

  </div>

  <!-- RIGHT: AGENDA VIEW -->
  <div class="agenda">
    <h2 style="color:#ffcc00;margin-bottom:10px;">Citas del día</h2>
    <div id="timeline"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"XXX",
  projectId:"XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const HOURS = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00"];

const timeline = document.getElementById("timeline");
const dateInput = document.getElementById("date");

dateInput.addEventListener("change", loadAgenda);

/* LOAD AGENDA */
async function loadAgenda(){

  const date = dateInput.value;
  timeline.innerHTML = "";

  if(!date) return;

  const q = query(collection(db,"appointments"), where("date","==",date));
  const snap = await getDocs(q);

  const data = snap.docs.map(d=>d.data());

  HOURS.forEach(hour=>{

    const match = data.find(a=>a.time===hour);

    const div = document.createElement("div");
    div.className = "slot";

    div.innerHTML = `
      <div class="time">${hour}</div>
      ${
        match
        ? `<div class="event">
            <h3>${match.name}</h3>
            <p>${match.phone}</p>
            <p>${match.email}</p>
          </div>`
        : `<div class="empty">Libre</div>`
      }
    `;

    timeline.appendChild(div);
  });
}

/* ADD APPOINTMENT */
window.addAppointment = async function(){

  const date = dateInput.value;
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;
  const time = document.getElementById("time").value;

  if(!date || !name || !phone || !email){
    alert("Completa todos los campos");
    return;
  }

  await addDoc(collection(db,"appointments"),{
    date,
    name,
    phone,
    email,
    time,
    createdAt:new Date()
  });

  alert("Cita agregada 🚗");

  loadAgenda();
};

</script>

</body>
</html>
