<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMHAYA | Agenda</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* layout */
.container {
  max-width: 750px;
  margin: auto;
  padding: 20px;
}

h1 {
  color: #ffcc00;
}

/* steps system */
.step {
  display: none;
  animation: fade 0.4s ease;
}

.step.active {
  display: block;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(15px);}
  to {opacity: 1; transform: translateY(0);}
}

/* cards */
.card {
  background: #111;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
  border: 1px solid #222;
}

/* inputs */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 8px;
  color: white;
}

input:focus {
  border-color: #ffcc00;
  outline: none;
}

/* calendar fake SaaS */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-top: 10px;
}

.day {
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  background: #111;
  cursor: pointer;
  border: 1px solid #222;
}

.day:hover {
  border-color: #ffcc00;
}

.day.selected {
  background: #ffcc00;
  color: black;
  font-weight: bold;
}

/* slots */
.slots {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 15px;
}

.slot {
  padding: 10px 15px;
  border-radius: 20px;
  background: #111;
  border: 1px solid #333;
  cursor: pointer;
  transition: 0.2s;
}

.slot:hover {
  transform: translateY(-2px);
  border-color: #ffcc00;
}

.slot.selected {
  background: #ffcc00;
  color: black;
}

/* buttons */
button {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background: #ffcc00;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: translateY(-2px);
}

/* modal */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: #111;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  border: 1px solid #ffcc00;
}
</style>
</head>

<body>

<div class="container">

<h1>Agenda tu cita</h1>

<!-- STEP 1 -->
<div class="step active" id="step1">
  <div class="card">
    <h3>1. Tus datos</h3>
    <input id="nombre" placeholder="Nombre">
    <input id="telefono" placeholder="Teléfono">

    <button onclick="nextStep(2)">Continuar</button>
  </div>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <div class="card">
    <h3>2. Selecciona fecha</h3>

    <input type="date" id="fecha" onchange="loadSlots()">

    <div class="slots" id="slots"></div>

    <button onclick="nextStep(3)">Continuar</button>
  </div>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
  <div class="card">
    <h3>3. Confirmar</h3>
    <p id="summary"></p>

    <button onclick="reservar()">Confirmar cita</button>
  </div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>✅ Cita Confirmada</h2>
    <p>Te contactaremos pronto</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH",
  databaseURL: "TU_DB",
  projectId: "TU_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let selectedDate = null;
let selectedTime = null;

/* steps */
function nextStep(step) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById("step" + step).classList.add("active");
}

/* slots */
const hours = ["09:00","10:00","11:00","12:00","14:00","15:00","16:00"];

function loadSlots() {
  const date = document.getElementById("fecha").value;
  selectedDate = date;

  const container = document.getElementById("slots");
  container.innerHTML = "";

  db.ref("citas/" + date).once("value", snap => {
    const data = snap.val() || {};

    hours.forEach(h => {
      if (!data[h]) {
        const div = document.createElement("div");
        div.className = "slot";
        div.innerText = h;

        div.onclick = () => {
          document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
          div.classList.add("selected");
          selectedTime = h;
        };

        container.appendChild(div);
      }
    });
  });
}

/* confirm */
function reservar() {
  const nombre = document.getElementById("nombre").value;
  const telefono = document.getElementById("telefono").value;

  if (!nombre || !telefono || !selectedDate || !selectedTime) {
    alert("Completa todo");
    return;
  }

  db.ref(`citas/${selectedDate}/${selectedTime}`).set({
    nombre,
    telefono,
    status: "booked"
  });

  document.getElementById("modal").style.display = "flex";
}
</script>

</body>
</html>
